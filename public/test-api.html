<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌳 API测试页面</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #FFF5F5;
            color: #4A5568;
        }
        
        h1 {
            color: #FF6B8B;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .test-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        
        .btn {
            background: #FFB6C1;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin: 5px;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            background: #FF8FA3;
            transform: translateY(-2px);
        }
        
        .result {
            background: #F7FAFC;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #E2E8F0;
        }
        
        .success {
            color: #38A169;
        }
        
        .error {
            color: #E53E3E;
        }
        
        .loading {
            color: #718096;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>🌳 匿名情绪树洞 - API测试</h1>
    
    <div class="test-section">
        <h2>1. 健康检查</h2>
        <button class="btn" onclick="testHealth()">测试 /api/health</button>
        <div id="healthResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>2. 获取留言列表</h2>
        <button class="btn" onclick="testGetMessages()">测试 /api/messages</button>
        <div id="messagesResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>3. 获取统计数据</h2>
        <button class="btn" onclick="testGetStats()">测试 /api/stats</button>
        <div id="statsResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>4. 获取分类</h2>
        <button class="btn" onclick="testGetCategories()">测试 /api/categories</button>
        <div id="categoriesResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>5. 提交测试留言</h2>
        <button class="btn" onclick="testPostMessage()">提交测试留言</button>
        <div id="postResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>6. 访问主页面</h2>
        <a href="/" class="btn">访问留言页</a>
        <a href="/messages.html" class="btn">访问展示页</a>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000';
        
        function showResult(elementId, data, isError = false) {
            const element = document.getElementById(elementId);
            const className = isError ? 'error' : 'success';
            element.innerHTML = `<span class="${className}">${JSON.stringify(data, null, 2)}</span>`;
        }
        
        function showLoading(elementId) {
            const element = document.getElementById(elementId);
            element.innerHTML = '<span class="loading">正在请求...</span>';
        }
        
        async function testHealth() {
            showLoading('healthResult');
            try {
                const response = await fetch(`${API_BASE}/api/health`);
                const data = await response.json();
                showResult('healthResult', data);
            } catch (error) {
                showResult('healthResult', { error: error.message }, true);
            }
        }
        
        async function testGetMessages() {
            showLoading('messagesResult');
            try {
                const response = await fetch(`${API_BASE}/api/messages`);
                const data = await response.json();
                showResult('messagesResult', data);
            } catch (error) {
                showResult('messagesResult', { error: error.message }, true);
            }
        }
        
        async function testGetStats() {
            showLoading('statsResult');
            try {
                const response = await fetch(`${API_BASE}/api/stats`);
                const data = await response.json();
                showResult('statsResult', data);
            } catch (error) {
                showResult('statsResult', { error: error.message }, true);
            }
        }
        
        async function testGetCategories() {
            showLoading('categoriesResult');
            try {
                const response = await fetch(`${API_BASE}/api/categories`);
                const data = await response.json();
                showResult('categoriesResult', data);
            } catch (error) {
                showResult('categoriesResult', { error: error.message }, true);
            }
        }
        
        async function testPostMessage() {
            showLoading('postResult');
            try {
                const testMessage = {
                    nickname: '测试用户',
                    emotion: '平静',
                    content: '这是一个测试留言，用于验证API功能是否正常。感谢树洞提供这个温暖的倾诉空间！',
                    category: 'general',
                    is_public: 1
                };
                
                const response = await fetch(`${API_BASE}/api/messages`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(testMessage)
                });
                
                const data = await response.json();
                showResult('postResult', data);
            } catch (error) {
                showResult('postResult', { error: error.message }, true);
            }
        }
        
        // 页面加载时自动测试健康检查
        window.onload = testHealth;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌲 树洞回音 - 大家的分享</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 页面特定样式 */
        .messages-header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #87CEEB, #98FB98);
            border-radius: 20px;
            margin-bottom: 40px;
            color: white;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }
        
        .messages-header h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            font-weight: 800;
        }
        
        .messages-header .subtitle {
            font-size: 1.3rem;
            opacity: 0.9;
            margin-bottom: 15px;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        
        .back-link:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        
        /* 留言网格布局 */
        .messages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        /* 静态留言卡片 */
        .static-message-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            border: 1px solid #E2E8F0;
            position: relative;
            overflow: hidden;
        }
        
        .static-message-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #FFB6C1, #87CEEB);
        }
        
        .static-message-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
        }
        
        .message-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .message-author {
            font-weight: 700;
            color: #4A5568;
            font-size: 1.1rem;
        }
        
        .message-time {
            font-size: 0.9rem;
            color: #94A3B8;
            background: #F7FAFC;
            padding: 4px 10px;
            border-radius: 12px;
        }
        
        .message-emotion-tag {
            display: inline-block;
            padding: 5px 12px;
            background: rgba(255, 182, 193, 0.15);
            color: #FF6B8B;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 15px;
            font-weight: 500;
        }
        
        .message-content {
            line-height: 1.7;
            color: #2D3748;
            font-size: 1.05rem;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #EDF2F7;
        }
        
        .message-reply {
            background: #F0FFF4;
            border-radius: 12px;
            padding: 18px;
            margin-top: 15px;
            border-left: 4px solid #38A169;
        }
        
        .reply-label {
            font-weight: 700;
            color: #38A169;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .reply-content {
            line-height: 1.6;
            color: #2D3748;
        }
        
        /* 统计卡片 */
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
        }
        
        .stat-card:nth-child(1) .stat-number { color: #FF6B8B; }
        .stat-card:nth-child(2) .stat-number { color: #4C8BF5; }
        .stat-card:nth-child(3) .stat-number { color: #38A169; }
        .stat-card:nth-child(4) .stat-number { color: #F6AD55; }
        
        .stat-label {
            color: #718096;
            font-size: 1rem;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: #F7FAFC;
            border-radius: 20px;
            margin: 40px 0;
        }
        
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .empty-state h3 {
            color: #4A5568;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }
        
        .empty-state p {
            color: #718096;
            max-width: 500px;
            margin: 0 auto 30px;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .messages-grid {
                grid-template-columns: 1fr;
            }
            
            .messages-header h1 {
                font-size: 2.2rem;
            }
            
            .stats-overview {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 480px) {
            .stats-overview {
                grid-template-columns: 1fr;
            }
            
            .static-message-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 页面头部 -->
        <header class="messages-header">
            <h1>🌲 树洞回音</h1>
            <p class="subtitle">倾听每一份心事，传递每一份温暖</p>
            <p>这里收集了大家分享的故事和树洞的温暖回应</p>
            <a href="/" class="back-link">📝 我也要分享心事</a>
        </header>
        
        <!-- 统计概览 -->
        <div class="stats-overview">
            <div class="stat-card">
                <div class="stat-number">42</div>
                <div class="stat-label">总分享数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">38</div>
                <div class="stat-label">已回应</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">8</div>
                <div class="stat-label">今日新增</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">4</div>
                <div class="stat-label">等待回应</div>
            </div>
        </div>
        
        <!-- 动态留言网格 -->
        <div class="messages-grid" id="dynamicMessagesGrid">
            <!-- 动态内容将由JavaScript加载 -->
            <div class="loading-state" style="grid-column: 1 / -1;">
                <div class="loading-spinner"></div>
                <p>正在加载温暖的故事...</p>
            </div>
        </div>
        
        <!-- 空状态示例（注释掉，实际使用时根据需要显示） -->
        <!--
        <div class="empty-state">
            <div class="empty-state-icon">🌱</div>
            <h3>树洞正在等待第一个故事</h3>
            <p>还没有人分享心事呢，成为第一个分享的人吧！你的故事可能会给他人带来温暖和力量。</p>
            <a href="/" class="btn">📝 写下第一个故事</a>
        </div>
        -->
        
        <!-- 分页导航 -->
        <div class="pagination">
            <a href="#" class="btn btn-secondary">← 上一页</a>
            <span class="page-info">第 1 页，共 3 页</span>
            <a href="#" class="btn btn-secondary">下一页 →</a>
        </div>
        
        <!-- 页脚 -->
        <footer class="footer">
            <p>🌳 匿名情绪树洞 | 项目代号: secret-treehouse</p>
            <p>💖 每一份心事都值得被倾听，每一份温暖都值得被传递</p>
            <p>🛡️ 我们承诺：所有留言都会严格匿名处理，保护你的隐私</p>
            <p class="mt-4">
                <a href="/">🏠 返回首页</a> | 
                <a href="javascript:void(0)" onclick="alert('关于树洞回音：这是大家分享心事的空间，所有内容都经过匿名处理，温暖回应由树洞团队精心撰写。')">关于此页</a> | 
                <a href="javascript:void(0)" onclick="alert('反馈建议：如果你对页面有任何建议，欢迎通过首页的联系我们功能反馈。')">反馈建议</a>
            </p>
        </footer>
    </div>

    <!-- 加载环境配置 -->
    <script src="config.js"></script>
    
    <!-- 加载动态数据脚本 -->
    <script src="dynamic-messages.js"></script>
    
    <script>
        // 简单的页面交互
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🌲 树洞回音页面已加载');
            
            // 模拟分页功能
            document.querySelectorAll('.pagination .btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    alert('分页功能将在后续版本中实现，敬请期待！');
                });
            });
        });
    </script>
</body>
</html>
